<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfólio - Projetos</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            overflow-x: hidden;
        }
        .container {
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #00d4ff;
        }
        .projetos-container {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .projeto-card {
            background-color: #1e1e1e;
            border-radius: 15px;
            padding: 20px;
            width: 300px;
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
        }
        .projeto-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 10px 20px rgba(0, 212, 255, 0.2);
        }
        .projeto-card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 10px;
            border: 2px solid #333;
        }
        .projeto-card h3 {
            margin-top: 15px;
            color: #00d4ff;
        }
        
        /* Modal de visualização do projeto */
        .projeto-view {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s ease;
            padding: 20px;
            box-sizing: border-box;
        }
        .projeto-view.active {
            opacity: 1;
            visibility: visible;
        }
        .projeto-view-content {
            background: #1e1e1e;
            border-radius: 15px;
            padding: 30px;
            max-width: 900px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.1);
        }
        .projeto-view img {
            width: 100%;
            max-height: 500px;
            object-fit: contain;
            border-radius: 10px;
            margin-bottom: 20px;
            border: 1px solid #333;
        }
        .projeto-view h2 {
            color: #00d4ff;
            margin-bottom: 15px;
            font-size: 28px;
        }
        .projeto-view p {
            line-height: 1.6;
            color: #ccc;
            margin-bottom: 20px;
        }
        .fechar {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 30px;
            cursor: pointer;
            color: #ffffff;
            transition: color 0.3s;
        }
        .fechar:hover {
            color: #ff5555;
        }
        
        /* Responsividade */
        @media (max-width: 768px) {
            .projeto-card {
                width: 100%;
                max-width: 350px;
            }
            .projeto-view-content {
                padding: 20px;
                width: 95%;
            }
            .projeto-view img {
                max-height: 300px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Meus Projetos</h1>
        <div class="projetos-container">
            <div class="projeto-card" onclick="abrirProjeto('img/Captura de Ecrã (14).png', 'Projeto 1', 'Site desenvolvido para a empresa Iezus com design moderno e responsivo. Tecnologias utilizadas: HTML5, CSS3, JavaScript.')">
                <img src="img/Captura de Ecrã (14).png" alt="Projeto 1">
                <h3>Projeto 1</h3>
            </div>
            <div class="projeto-card" onclick="abrirProjeto('img/Captura de Ecrã (17).png', 'Projeto 2', 'Landing page criada para campanha de marketing digital. Foco em conversão e experiência do usuário.')">
                <img src="img/Captura de Ecrã (17).png" alt="Projeto 2">
                <h3>Projeto 2</h3>
            </div>
            <div class="projeto-card" onclick="abrirProjeto('img/Captura de Ecrã (16).png', 'Projeto 3', 'Aplicação web com funcionalidades avançadas e integração com API. Desenvolvido com React.js.')">
                <img src="img/Captura de Ecrã (16).png" alt="Projeto 3">
                <h3>Projeto 3</h3>
            </div>
        </div>
    </div>
    
    <!-- Modal de visualização do projeto -->
    <div class="projeto-view" id="projetoView">
        <div class="projeto-view-content">
            <span class="fechar" onclick="fecharProjeto()">&times;</span>
            <img id="projetoImg" src="" alt="Visualização do Projeto">
            <h2 id="projetoTitulo">Título do Projeto</h2>
            <p id="projetoDescricao">Descrição detalhada do projeto aqui...</p>
        </div>
    </div>
    
    <script>
        function abrirProjeto(imgSrc, titulo, descricao) {
            document.getElementById('projetoImg').src = imgSrc;
            document.getElementById('projetoTitulo').innerText = titulo;
            document.getElementById('projetoDescricao').innerText = descricao;
            document.getElementById('projetoView').classList.add('active');
            document.body.style.overflow = 'hidden'; // Impede rolagem da página
        }
        
        function fecharProjeto() {
            document.getElementById('projetoView').classList.remove('active');
            document.body.style.overflow = 'auto'; // Restaura rolagem da página
        }
        
        // Fechar modal ao pressionar ESC
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                fecharProjeto();
            }
        });
        
        // Fechar modal ao clicar fora do conteúdo
        document.getElementById('projetoView').addEventListener('click', function(e) {
            if (e.target === this) {
                fecharProjeto();
            }
        });
    </script>
</body>
</html>
